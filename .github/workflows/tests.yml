name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e '.[dev,aws]'
      - name: Unit and integration tests
        run: pytest
      - name: Ruff lint
        run: ruff check src tests scripts
      - name: Mypy type check
        run: mypy src
      - name: Bandit security scan
        run: bandit -q -r src
      - name: Upgrade vulnerable build tooling before audit
        run: pip install -U pip 'setuptools>=83.0.0' 'wheel>=0.46.2' 'urllib3>=2.7.0'
      - name: Dependency vulnerability scan
        run: pip-audit

  terraform-static-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
      - name: Terraform fmt
        run: terraform -chdir=infra/terraform fmt -check -recursive
      - name: Terraform init without backend
        run: terraform -chdir=infra/terraform init -backend=false
      - name: Terraform validate
        run: terraform -chdir=infra/terraform validate
      - name: Terraform security scan (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          quiet: true
          soft_fail: false
      - name: Terraform security scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform
      - name: Install conftest
        run: |
          CONFTEST_VERSION=0.56.0
          curl -fsSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" -o conftest.tar.gz
          tar xzf conftest.tar.gz conftest
          sudo mv conftest /usr/local/bin/conftest
      - name: Policy gate on production tfvars (Conftest/OPA)
        run: conftest test infra/terraform/environments/prod/terraform.tfvars --parser hcl2 --policy policy
